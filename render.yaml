services:
  - type: web
    name: sammtech-kanban-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: sh -c "sleep 15 && npx prisma migrate deploy && node dist/main.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api
      - key: CORS_ORIGIN
        value: https://sammtech-kanban-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: kanban-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: BCRYPT_ROUNDS
        value: 12
      - key: THROTTLE_TTL_MS
        value: "60000"
      - key: THROTTLE_LIMIT
        value: "100"
      - key: CLOUDINARY_CLOUD_NAME
        value: dev
      - key: CLOUDINARY_API_KEY
        value: dev
      - key: CLOUDINARY_API_SECRET
        value: dev

databases:
  - name: kanban-db
    plan: free
    region: singapore
    databaseName: kanban
    ipAllowList: []
